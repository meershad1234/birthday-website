<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Meershad ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#200122,#6f0000,#ff416c);
    color:white;
}

/* Card */
.card{
    position:relative;
    width:90%;
    max-width:500px;
    padding:40px;
    text-align:center;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);
    border-radius:25px;
    box-shadow:0 0 40px rgba(255,0,80,0.5);
    animation:appear 2s;
}

h1{
    font-size:45px;
    color:#ffd1dc;
    text-shadow:0 0 20px #ff4d6d;
}

h2{
    margin:15px;
    color:white;
}

p{
    line-height:1.7;
    font-size:18px;
}

.heart{
    font-size:60px;
    animation:beat 1s infinite;
}

button{
    margin-top:25px;
    padding:15px 30px;
    border:none;
    border-radius:30px;
    background:#ff1744;
    color:white;
    font-size:17px;
    cursor:pointer;
    box-shadow:0 0 20px pink;
}

button:hover{
    transform:scale(1.1);
}

/* Moon */
.moon{
    position:absolute;
    top:40px;
    right:50px;
    width:100px;
    height:100px;
    background:#fff0b3;
    border-radius:50%;
    box-shadow:0 0 50px #fff0b3;
}

/* Stars */
.star{
    position:absolute;
    color:white;
    animation:shine 2s infinite alternate;
}

@keyframes shine{
    from{opacity:.3}
    to{opacity:1}
}

/* Floating hearts */
.float-heart{
    position:absolute;
    bottom:-50px;
    font-size:30px;
    animation:rise 8s linear infinite;
}

@keyframes rise{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

@keyframes beat{
    50%{transform:scale(1.2);}
}

@keyframes appear{
    from{
        opacity:0;
        transform:scale(.7);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

</style>
</head>


<body>

<div class="moon"></div>

<div class="star" style="top:15%;left:20%">✨</div>
<div class="star" style="top:30%;left:70%">⭐</div>
<div class="star" style="top:70%;left:15%">✨</div>
<div class="star" style="top:20%;left:50%">⭐</div>


<div class="card">

<div class="heart">❤️</div>

<h1>Happy Birthday</h1>

<h2>Meershad 🎂</h2>

<p>
Today is a special day because someone amazing
was born.

<br><br>

I hope your life is always filled with happiness,
success, endless smiles, and beautiful moments.

<br><br>

Even if I don't always say it,
your happiness means a lot to me.

</p>

<button onclick="surprise()">
Open My Wish 💌
</button>

<p id="msg"></p>

<br>

<p>
With love ❤️<br>
<strong>From Me</strong>
</p>

</div>


<script>

function surprise(){
document.getElementById("msg").innerHTML=
"🌹 You deserve all the happiness in the world. Happy Birthday Meershad ❤️";
}


// floating hearts

setInterval(()=>{

let h=document.createElement("div");
h.className="float-heart";
h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(h);

setTimeout(()=>{
h.remove();
},8000);

},500);

</script>

</body>
</html>
